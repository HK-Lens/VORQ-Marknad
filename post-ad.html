<!DOCTYPE html>
<html lang="sv">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Publicera annons | VORQ Marknad</title><link rel="stylesheet" href="styles.css"></head>
<body>
<header class="header"><div class="container header-in"><a class="brand" href="index.html"><img src="vorq-group-logo.svg" alt="VORQ Group"><div><div class="brand-title">VORQ Marknad</div><div class="brand-sub">Publicera annons</div></div></a><nav class="nav"><a href="index.html">Hem</a><a href="account.html">Mitt konto</a><span id="authArea"></span></nav></div></header>
<main class="container section"><section class="panel"><div class="eyebrow">Sälj begagnat</div><h1 class="section-title">Publicera annons</h1><p class="admin-note">Fyll i tydlig titel, exakt beskrivning, pris, plats och upp till 6 bilder.</p><div id="status" class="notice hidden"></div></section><form id="adForm" class="panel"><div class="form-grid"><div class="field"><label>Titel *</label><input id="title" required maxlength="80" placeholder="t.ex. IKEA soffa i bra skick"></div><div class="field"><label>Pris SEK *</label><input id="price" type="number" min="0" required placeholder="500"></div><div class="field"><label>Kategori *</label><select id="category" required></select></div><div class="field"><label>Skick *</label><select id="condition" required></select></div><div class="field"><label>Stad *</label><input id="city" required placeholder="Aneby"></div><div class="field"><label>Adress / område</label><input id="address" placeholder="Valfri exakt eller ungefärlig plats"></div></div><div class="field"><label>Detaljerad beskrivning *</label><textarea id="description" required maxlength="2500" placeholder="Beskriv produktens skick, storlek, ålder, fel, tillbehör och varför den säljs."></textarea></div><div class="field"><label>Bilder</label><input id="images" type="file" accept="image/*" multiple><small class="admin-note">Max 6 bilder. Första bilden blir huvudbild.</small><div id="preview" class="image-preview"></div></div><button id="submitBtn" class="btn btn-primary" type="submit">Publicera annons</button><a class="btn btn-white" href="account.html">Avbryt</a></form></main>
<script type="module" src="common.js"></script><script type="module" src="post-ad.js"></script>
</body></html>
